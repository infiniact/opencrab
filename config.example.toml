[gateway]
host = "127.0.0.1"
port = 18789
auth_token = ""           # empty = loopback-only, no auth required

[agent]
provider = "openai"       # See supported providers below
model = "gpt-4o"
api_key = "${OPENAI_API_KEY}"
# base_url = ""           # Optional: override provider's default API endpoint
# api_version = ""        # Optional: API version (used by Azure)
temperature = 0.7
max_tokens = 4096
system_prompt = "You are a helpful assistant."

# ─── Provider examples (uncomment one) ──────────────────────────────────
#
# --- OpenAI (default, uses Responses API) ---
# provider = "openai"
# model = "gpt-4o"
# api_key = "${OPENAI_API_KEY}"
#
# --- OpenAI-compatible (any endpoint that speaks the OpenAI Completions API) ---
# provider = "openai-compatible"
# model = "your-model-name"
# api_key = "${API_KEY}"         # use "" if the endpoint needs no auth
# base_url = "http://localhost:8000/v1"
#
# --- Anthropic ---
# provider = "anthropic"
# model = "claude-sonnet-4-20250514"
# api_key = "${ANTHROPIC_API_KEY}"
#
# --- DeepSeek ---
# provider = "deepseek"
# model = "deepseek-chat"
# api_key = "${DEEPSEEK_API_KEY}"
#
# --- Ollama (local, no API key needed) ---
# provider = "ollama"
# model = "qwen2.5:14b"
# api_key = ""
# base_url = "http://localhost:11434"   # default Ollama address
